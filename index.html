<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendário</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:          #1e2023;
    --surface:     #272b2f;
    --surface2:    #2e3338;
    --border:      #353a3f;
    --border-soft: #2c3136;
    --text:        #d4d8dc;
    --text-muted:  #6b7280;
    --text-faint:  #3d454e;
    --accent:      #d4d8dc;
    --today-bg:    #d4d8dc;
    --today-text:  #1e2023;
    --tab-active:  #d4d8dc;
    --tab-inactive:#6b7280;
    --radius:      11px;
    --font:        'DM Sans', sans-serif;
    --mono:        'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    padding: 22px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .header-month {
    font-size: 19px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-top: 2px;
  }
  .nav-btns { display: flex; gap: 5px; }
  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    width: 32px; height: 32px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:active { border-color: var(--text-muted); color: var(--text); }

  /* TABS */
  .tabs {
    display: flex;
    padding: 18px 20px 0;
    gap: 22px;
    border-bottom: 1px solid var(--border-soft);
    margin-top: 4px;
  }
  .tab {
    font-size: 13px;
    font-weight: 400;
    color: var(--tab-inactive);
    padding-bottom: 11px;
    cursor: pointer;
    border-bottom: 1.5px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none; border-left: none; border-right: none;
    letter-spacing: 0.01em;
  }
  .tab.active {
    color: var(--tab-active);
    border-bottom-color: var(--tab-active);
    font-weight: 500;
  }

  #loadingBar {
    height: 1.5px;
    background: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* =====================
     TAB 1 — AGENDA
  ===================== */
  .scroll-view { padding: 10px 16px 100px; }

  .day-block {
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s;
    min-height: calc((100dvh - 136px) / 3.1);
  }
  .day-block.today  { border-color: var(--border); }
  .day-block.focused { border-color: #45505c; }

  .day-block-header {
    padding: 12px 14px 8px;
    display: flex;
    align-items: baseline;
    gap: 9px;
    flex-shrink: 0;
    user-select: none;
  }
  .day-num {
    font-size: 21px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }
  .day-name {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .day-block.today .day-num {
    background: var(--today-bg);
    color: var(--today-text);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 17px;
  }

  .day-textarea {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font);
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    padding: 0 14px 12px;
    min-height: 56px;
    caret-color: var(--text);
    -webkit-appearance: none;
    overflow: hidden;
  }
  .day-textarea::placeholder { color: var(--text-faint); font-weight: 300; }

  .day-saving {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-faint);
    padding: 0 14px 8px;
    text-align: right;
    flex-shrink: 0;
    min-height: 18px;
  }

  /* =====================
     TAB 2 — GRID
  ===================== */
  .grid-view { padding: 14px 16px 100px; }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 5px;
  }
  .weekday-label {
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-faint);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 4px 0;
  }
  .grid-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .grid-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
  }
  .grid-day:active { background: var(--surface2); }
  .grid-day-num {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1;
    color: var(--text);
  }
  .grid-day.today { background: var(--today-bg); }
  .grid-day.today .grid-day-num { color: var(--today-text); }
  .grid-day.other-month .grid-day-num { color: var(--text-faint); }
  .grid-dot { width: 3px; height: 3px; margin-top: 4px; border-radius: 50%; }
  .grid-day.has-entry .grid-dot { background: var(--text-muted); }
  .grid-day.today.has-entry .grid-dot { background: var(--today-text); opacity: 0.5; }

  /* =====================
     MODAL (grid only)
  ===================== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    width: 100%; max-width: 480px;
    padding: 0 0 44px;
    max-height: 72dvh;
    overflow-y: auto;
    animation: slideUp 0.22s cubic-bezier(.22,.7,.36,1);
    border-top: 1px solid var(--border);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0.4; }
    to   { transform: translateY(0);    opacity: 1;   }
  }
  .modal-handle {
    width: 34px; height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    padding: 16px 20px 14px;
    display: flex; align-items: baseline; gap: 9px;
    border-bottom: 1px solid var(--border-soft);
  }
  .modal-date-big {
    font-size: 19px; font-weight: 300;
    letter-spacing: -0.03em; color: var(--text);
  }
  .modal-date-sub {
    font-size: 11px; color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .modal-close {
    margin-left: auto; background: none; border: none;
    cursor: pointer; color: var(--text-muted);
    font-size: 17px; padding: 4px; line-height: 1;
  }
  .modal-notepad { padding: 16px 20px 0; }
  .modal-notepad-label {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 10px;
  }
  .modal-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border-soft);
    border-radius: 9px;
    outline: none; resize: none;
    font-family: var(--font);
    font-size: 13.5px; line-height: 1.65;
    color: var(--text);
    padding: 12px 14px;
    min-height: 130px;
    caret-color: var(--text);
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .modal-textarea:focus { border-color: #45505c; }
  .modal-textarea::placeholder { color: var(--text-faint); }
  .modal-save-row {
    padding: 12px 20px 0;
    display: flex; align-items: center;
  }
  .modal-saving-hint {
    font-size: 11px; font-family: var(--mono);
    color: var(--text-faint); margin-right: auto;
  }
  .modal-save-btn {
    font-family: var(--font); font-size: 13px; font-weight: 500;
    background: var(--today-bg); color: var(--today-text);
    border: none; border-radius: 8px;
    padding: 10px 22px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .modal-save-btn:active { opacity: 0.7; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Calendário</div>
    <div class="header-month" id="headerMonth"></div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="scroll">Agenda</button>
  <button class="tab" data-tab="grid">Mês</button>
</div>
<div id="loadingBar"></div>

<div class="content">
  <div id="scrollView" class="scroll-view"></div>
  <div id="gridView"  class="grid-view hidden"></div>
</div>

<!-- MODAL — usado apenas na aba Mês -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-date-big" id="modalDateBig"></span>
      <span class="modal-date-sub" id="modalDateSub"></span>
      <button class="modal-close" id="modalClose">&#x2715;</button>
    </div>
    <div class="modal-notepad">
      <div class="modal-notepad-label">Notas do dia</div>
      <textarea class="modal-textarea" id="modalTextarea" placeholder="Escreva aqui..."></textarea>
    </div>
    <div class="modal-save-row">
      <span class="modal-saving-hint" id="modalSavingHint"></span>
      <button class="modal-save-btn" id="modalSaveBtn">Salvar</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://gkxpotnhfwowyqesqvxa.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdreHBvdG5oZndvd3lxZXNxdnhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTc5MTEsImV4cCI6MjA5MDczMzkxMX0.7Ahxax54XakWviCiT2fBgKyuhskP3qTLc2lsOQNEGoE';

  const api = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    ...opts
  });

  const today = new Date();
  let currentYear  = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDate = null;
  let notes = {}; // { "YYYY-MM-DD": { id, text } }
  const saveTimers = {};

  const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS_PT   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const DAYS_FULL = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];

  function toKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  function isToday(y, m, d) {
    return y === today.getFullYear() && m === today.getMonth() && d === today.getDate();
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function showLoading(on) {
    document.getElementById('loadingBar').style.opacity = on ? '1' : '0';
  }

  // ---- SUPABASE ----
  async function loadMonth(year, month) {
    const from = toKey(year, month, 1);
    const to   = toKey(year, month, new Date(year, month + 1, 0).getDate());
    showLoading(true);
    try {
      const res  = await api(`events?date=gte.${from}&date=lte.${to}&order=created_at.desc`);
      const rows = await res.json();
      Object.keys(notes).forEach(k => { if (k >= from && k <= to) delete notes[k]; });
      rows.forEach(row => {
        if (!notes[row.date]) notes[row.date] = { id: row.id, text: row.text };
      });
    } catch(e) { console.error(e); }
    showLoading(false);
    render();
  }

  async function saveNote(date, text) {
    const existing = notes[date];
    if (!text.trim()) {
      if (existing) {
        await api(`events?id=eq.${existing.id}`, { method: 'DELETE', prefer: 'return=minimal' });
        delete notes[date];
      }
      return;
    }
    if (existing) {
      await api(`events?id=eq.${existing.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ text }),
        prefer: 'return=minimal'
      });
      notes[date].text = text;
    } else {
      const res  = await api('events', { method: 'POST', body: JSON.stringify({ date, text, time: null }) });
      const rows = await res.json();
      if (rows[0]) notes[date] = { id: rows[0].id, text };
    }
  }

  // ---- HEADER / TABS / NAV ----
  function updateHeader() {
    document.getElementById('headerMonth').textContent = `${MONTHS_PT[currentMonth]} ${currentYear}`;
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const which = tab.dataset.tab;
      document.getElementById('scrollView').classList.toggle('hidden', which !== 'scroll');
      document.getElementById('gridView').classList.toggle('hidden', which !== 'grid');
      render();
    });
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    updateHeader(); loadMonth(currentYear, currentMonth);
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    updateHeader(); loadMonth(currentYear, currentMonth);
  });

  function render() {
    const active = document.querySelector('.tab.active').dataset.tab;
    if (active === 'scroll') renderScroll();
    else renderGrid();
  }

  // ---- AGENDA: blocos de notas inline ----
  function renderScroll() {
    const container   = document.getElementById('scrollView');
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const isCurMonth  = currentYear === today.getFullYear() && currentMonth === today.getMonth();
    const startDay    = isCurMonth ? today.getDate() : 1;

    // preserve live text before re-render
    const live = {};
    container.querySelectorAll('.day-textarea').forEach(ta => { live[ta.dataset.key] = ta.value; });

    let html = '';
    for (let d = startDay; d <= daysInMonth; d++) {
      const key    = toKey(currentYear, currentMonth, d);
      const dow    = new Date(currentYear, currentMonth, d).getDay();
      const isT    = isToday(currentYear, currentMonth, d);
      const stored = notes[key] ? escHtml(notes[key].text) : '';
      html += `<div class="day-block${isT ? ' today' : ''}" data-key="${key}">`;
      html += `<div class="day-block-header"><span class="day-num">${d}</span><span class="day-name">${DAYS_FULL[dow]}</span></div>`;
      html += `<textarea class="day-textarea" data-key="${key}" placeholder="Escreva aqui...">${stored}</textarea>`;
      html += `<div class="day-saving" id="saving-${key}"></div>`;
      html += `</div>`;
    }
    container.innerHTML = html;

    container.querySelectorAll('.day-textarea').forEach(ta => {
      const k = ta.dataset.key;
      // restore live value if user was typing
      if (live[k] !== undefined && live[k] !== ta.value) ta.value = live[k];
      autoResize(ta);

      ta.addEventListener('input', () => {
        autoResize(ta);
        triggerSave(k, ta.value);
      });
      ta.addEventListener('focus', () => ta.closest('.day-block').classList.add('focused'));
      ta.addEventListener('blur',  () => ta.closest('.day-block').classList.remove('focused'));
    });
  }

  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.max(ta.scrollHeight, 56) + 'px';
  }

  function triggerSave(key, text) {
    const hint = document.getElementById(`saving-${key}`);
    if (hint) hint.textContent = '';
    clearTimeout(saveTimers[key]);
    saveTimers[key] = setTimeout(async () => {
      try {
        if (hint) hint.textContent = 'salvando...';
        await saveNote(key, text);
        if (hint) {
          hint.textContent = 'salvo';
          setTimeout(() => { if (hint) hint.textContent = ''; }, 1400);
        }
        // atualiza ponto no grid sem re-render completo
        const gd = document.querySelector(`.grid-day[data-key="${key}"]`);
        if (gd) gd.classList.toggle('has-entry', !!text.trim());
      } catch(e) {
        if (hint) hint.textContent = 'erro ao salvar';
      }
    }, 900);
  }

  // ---- GRID ----
  function renderGrid() {
    const container   = document.getElementById('gridView');
    const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevDays    = new Date(currentYear, currentMonth, 0).getDate();

    let html = '<div class="weekdays">';
    DAYS_PT.forEach(d => { html += `<div class="weekday-label">${d}</div>`; });
    html += '</div><div class="grid-days">';

    for (let i = firstDay - 1; i >= 0; i--) {
      const d = prevDays - i;
      const pm = currentMonth - 1 < 0 ? 11 : currentMonth - 1;
      const py = currentMonth - 1 < 0 ? currentYear - 1 : currentYear;
      const key = toKey(py, pm, d);
      html += `<div class="grid-day other-month${notes[key]?' has-entry':''}" data-key="${key}"><span class="grid-day-num">${d}</span><div class="grid-dot"></div></div>`;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const key = toKey(currentYear, currentMonth, d);
      const isT = isToday(currentYear, currentMonth, d);
      html += `<div class="grid-day${isT?' today':''}${notes[key]?' has-entry':''}" data-key="${key}"><span class="grid-day-num">${d}</span><div class="grid-dot"></div></div>`;
    }
    const total = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    let nxt = 1;
    for (let i = firstDay + daysInMonth; i < total; i++) {
      const nm = currentMonth + 1 > 11 ? 0 : currentMonth + 1;
      const ny = currentMonth + 1 > 11 ? currentYear + 1 : currentYear;
      const key = toKey(ny, nm, nxt);
      html += `<div class="grid-day other-month${notes[key]?' has-entry':''}" data-key="${key}"><span class="grid-day-num">${nxt}</span><div class="grid-dot"></div></div>`;
      nxt++;
    }
    html += '</div>';
    container.innerHTML = html;
    container.querySelectorAll('.grid-day').forEach(el => {
      el.addEventListener('click', () => openModal(el.dataset.key));
    });
  }

  // ---- MODAL ----
  function openModal(key) {
    selectedDate = key;
    const [y, m, d] = key.split('-').map(Number);
    const dow = new Date(y, m - 1, d).getDay();
    document.getElementById('modalDateBig').textContent   = `${d} de ${MONTHS_PT[m-1]}`;
    document.getElementById('modalDateSub').textContent   = `${DAYS_FULL[dow]}, ${y}`;
    document.getElementById('modalTextarea').value        = notes[key] ? notes[key].text : '';
    document.getElementById('modalSavingHint').textContent = '';
    document.getElementById('modalSaveBtn').disabled = false;
    document.getElementById('modalSaveBtn').textContent = 'Salvar';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('modalTextarea').focus(), 200);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    selectedDate = null;
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  document.getElementById('modalSaveBtn').addEventListener('click', async () => {
    const text = document.getElementById('modalTextarea').value;
    const btn  = document.getElementById('modalSaveBtn');
    const hint = document.getElementById('modalSavingHint');
    btn.disabled = true; btn.textContent = '...';
    hint.textContent = 'salvando...';
    try {
      await saveNote(selectedDate, text);
      hint.textContent = 'salvo';
      render();
      setTimeout(closeModal, 500);
    } catch(e) {
      hint.textContent = 'erro ao salvar';
      btn.disabled = false; btn.textContent = 'Salvar';
    }
  });

  // ---- POLLING ----
  setInterval(() => loadMonth(currentYear, currentMonth), 20000);

  // ---- INIT ----
  updateHeader();
  loadMonth(currentYear, currentMonth);
</script>
</body>
</html>
