<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendário</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f7f7f6;
    --border: #e8e8e6;
    --text: #1a1a18;
    --text-muted: #9b9b96;
    --accent: #1a1a18;
    --accent-light: #f0f0ee;
    --today: #1a1a18;
    --today-text: #ffffff;
    --entry-dot: #1a1a18;
    --tab-active: #1a1a18;
    --tab-inactive: #9b9b96;
    --modal-bg: rgba(0,0,0,0.18);
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .header-month {
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .nav-btns {
    display: flex;
    gap: 4px;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 30px;
    height: 30px;
    cursor: pointer;
    color: var(--text);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:active { background: var(--accent-light); }

  /* TABS */
  .tabs {
    display: flex;
    padding: 16px 20px 0;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    margin-top: 4px;
  }

  .tab {
    font-size: 13px;
    font-weight: 400;
    color: var(--tab-inactive);
    padding-bottom: 10px;
    cursor: pointer;
    border-bottom: 1.5px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.01em;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab.active {
    color: var(--tab-active);
    border-bottom-color: var(--tab-active);
    font-weight: 500;
  }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* === TAB 1: SCROLL DAYS === */
  .scroll-view { padding: 8px 20px 100px; }

  .scroll-day {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
    min-height: calc((100dvh - 130px) / 3.2);
  }

  .scroll-day:active { border-color: var(--text-muted); }
  .scroll-day.has-entry { border-color: var(--text); }

  .scroll-day-header {
    padding: 12px 14px 10px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    user-select: none;
  }

  .scroll-day-num {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .scroll-day-name {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .scroll-day.today .scroll-day-num {
    background: var(--today);
    color: var(--today-text);
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 18px;
  }

  .scroll-day-entries {
    padding: 0 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .entry-pill {
    background: var(--surface);
    border-radius: 5px;
    padding: 6px 10px;
    font-size: 12.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
    line-height: 1.3;
  }

  .entry-pill .entry-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .entry-pill .entry-text {
    flex: 1;
    word-break: break-word;
  }

  .scroll-day-empty {
    font-size: 12px;
    color: var(--text-muted);
    padding-bottom: 12px;
  }

  /* === TAB 2: GRID CALENDAR === */
  .grid-view { padding: 12px 20px 100px; }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }

  .weekday-label {
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 0;
  }

  .grid-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .grid-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    user-select: none;
  }

  .grid-day:active { background: var(--accent-light); }

  .grid-day-num {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .grid-day.today {
    background: var(--today);
  }
  .grid-day.today .grid-day-num { color: var(--today-text); }

  .grid-day.other-month .grid-day-num { color: var(--border); }

  .grid-day.has-entry .grid-dot {
    width: 3px;
    height: 3px;
    background: var(--entry-dot);
    border-radius: 50%;
    margin-top: 3px;
  }
  .grid-day.today.has-entry .grid-dot { background: var(--today-text); }
  .grid-dot { width: 3px; height: 3px; margin-top: 3px; }

  /* === MODAL === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--modal-bg);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 0 0 40px;
    max-height: 88dvh;
    overflow-y: auto;
    animation: slideUp 0.22s cubic-bezier(.22,.7,.36,1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0.5; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .modal-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .modal-date-big {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: -0.03em;
  }

  .modal-date-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .modal-close {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
    padding: 4px;
  }

  /* Entry list in modal */
  .modal-entries {
    padding: 12px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .modal-entry-item {
    background: var(--surface);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .modal-entry-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    padding-top: 1px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .modal-entry-text {
    font-size: 13px;
    line-height: 1.4;
    flex: 1;
    word-break: break-word;
  }

  .modal-entry-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 14px;
    padding: 0 0 0 6px;
    flex-shrink: 0;
    transition: color 0.12s;
  }
  .modal-entry-del:active { color: #c0392b; }

  /* New entry form */
  .modal-form {
    padding: 14px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .modal-form label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    display: block;
    margin-bottom: 4px;
  }

  .modal-input-group {
    display: flex;
    gap: 8px;
  }

  .modal-time-input {
    font-family: var(--mono);
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 10px;
    background: var(--bg);
    color: var(--text);
    width: 110px;
    outline: none;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }
  .modal-time-input:focus { border-color: var(--text); }

  .modal-text-input {
    font-family: var(--font);
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    background: var(--bg);
    color: var(--text);
    flex: 1;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
    min-height: 38px;
    max-height: 120px;
    line-height: 1.4;
  }
  .modal-text-input:focus { border-color: var(--text); }

  .modal-add-btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 10px 20px;
    cursor: pointer;
    align-self: flex-end;
    transition: opacity 0.12s;
  }
  .modal-add-btn:active { opacity: 0.75; }

  /* separator */
  .modal-sep {
    height: 1px;
    background: var(--border);
    margin: 12px 20px 0;
  }

  .modal-section-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 12px 20px 0;
  }

  /* hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title" id="headerTitle">Calendário</div>
    <div class="header-month" id="headerMonth"></div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="scroll">Agenda</button>
  <button class="tab" data-tab="grid">Mês</button>
</div>

<div class="content">
  <div id="scrollView" class="scroll-view"></div>
  <div id="gridView" class="grid-view hidden"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-date-big" id="modalDateBig"></span>
      <span class="modal-date-sub" id="modalDateSub"></span>
      <button class="modal-close" id="modalClose">&#x2715;</button>
    </div>
    <div id="modalEntriesSection"></div>
    <div class="modal-sep"></div>
    <div class="modal-section-label">Novo evento</div>
    <div class="modal-form">
      <div class="modal-input-group">
        <input type="time" class="modal-time-input" id="inputTime" placeholder="Hora">
        <textarea class="modal-text-input" id="inputText" placeholder="Escreva aqui..." rows="1"></textarea>
      </div>
      <button class="modal-add-btn" id="addBtn">Adicionar</button>
    </div>
  </div>
</div>

<script>
  // ---- STATE ----
  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDate = null; // "YYYY-MM-DD"

  // entries: { "YYYY-MM-DD": [{time, text}, ...] }
  let entries = {};

  // Load from localStorage
  try {
    const saved = localStorage.getItem('cal_entries');
    if (saved) entries = JSON.parse(saved);
  } catch(e) {}

  function saveEntries() {
    try { localStorage.setItem('cal_entries', JSON.stringify(entries)); } catch(e) {}
  }

  const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const DAYS_FULL = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];

  function toKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function isToday(y, m, d) {
    return y === today.getFullYear() && m === today.getMonth() && d === today.getDate();
  }

  // ---- HEADER ----
  function updateHeader() {
    document.getElementById('headerMonth').textContent = `${MONTHS_PT[currentMonth]} ${currentYear}`;
  }

  // ---- TABS ----
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const which = tab.dataset.tab;
      document.getElementById('scrollView').classList.toggle('hidden', which !== 'scroll');
      document.getElementById('gridView').classList.toggle('hidden', which !== 'grid');
      render();
    });
  });

  // ---- NAV ----
  document.getElementById('prevBtn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    updateHeader(); render();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    updateHeader(); render();
  });

  // ---- RENDER ----
  function render() {
    const activeTab = document.querySelector('.tab.active').dataset.tab;
    if (activeTab === 'scroll') renderScroll();
    else renderGrid();
  }

  function renderScroll() {
    const container = document.getElementById('scrollView');
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    // Determine start day: if viewing current month, start from today; otherwise day 1
    const isCurrentMonth = currentYear === today.getFullYear() && currentMonth === today.getMonth();
    const startDay = isCurrentMonth ? today.getDate() : 1;

    let html = '';
    for (let d = startDay; d <= daysInMonth; d++) {
      const key = toKey(currentYear, currentMonth, d);
      const dayEntries = entries[key] || [];
      const dow = new Date(currentYear, currentMonth, d).getDay();
      const isT = isToday(currentYear, currentMonth, d);
      const hasE = dayEntries.length > 0;
      html += `<div class="scroll-day${isT?' today':''}${hasE?' has-entry':''}" data-key="${key}" data-d="${d}">`;
      html += `<div class="scroll-day-header">`;
      html += `<span class="scroll-day-num">${d}</span>`;
      html += `<span class="scroll-day-name">${DAYS_FULL[dow]}</span>`;
      html += `</div>`;
      if (hasE) {
        html += `<div class="scroll-day-entries">`;
        dayEntries.forEach((e) => {
          html += `<div class="entry-pill">`;
          if (e.time) html += `<span class="entry-time">${e.time}</span>`;
          html += `<span class="entry-text">${escHtml(e.text)}</span>`;
          html += `</div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    }
    container.innerHTML = html;
    container.querySelectorAll('.scroll-day').forEach(el => {
      el.addEventListener('click', () => openModal(el.dataset.key));
    });
  }

  function renderGrid() {
    const container = document.getElementById('gridView');
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevDays = new Date(currentYear, currentMonth, 0).getDate();

    let html = '<div class="weekdays">';
    DAYS_PT.forEach(d => { html += `<div class="weekday-label">${d}</div>`; });
    html += '</div><div class="grid-days">';

    // prev month padding
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = prevDays - i;
      const pm = currentMonth - 1 < 0 ? 11 : currentMonth - 1;
      const py = currentMonth - 1 < 0 ? currentYear - 1 : currentYear;
      const key = toKey(py, pm, d);
      const hasE = (entries[key]||[]).length > 0;
      html += `<div class="grid-day other-month${hasE?' has-entry':''}" data-key="${key}">`;
      html += `<span class="grid-day-num">${d}</span><div class="grid-dot"></div></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = toKey(currentYear, currentMonth, d);
      const isT = isToday(currentYear, currentMonth, d);
      const hasE = (entries[key]||[]).length > 0;
      html += `<div class="grid-day${isT?' today':''}${hasE?' has-entry':''}" data-key="${key}">`;
      html += `<span class="grid-day-num">${d}</span><div class="grid-dot"></div></div>`;
    }

    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    let nextD = 1;
    for (let i = firstDay + daysInMonth; i < totalCells; i++) {
      const nm = currentMonth + 1 > 11 ? 0 : currentMonth + 1;
      const ny = currentMonth + 1 > 11 ? currentYear + 1 : currentYear;
      const key = toKey(ny, nm, nextD);
      const hasE = (entries[key]||[]).length > 0;
      html += `<div class="grid-day other-month${hasE?' has-entry':''}" data-key="${key}">`;
      html += `<span class="grid-day-num">${nextD}</span><div class="grid-dot"></div></div>`;
      nextD++;
    }

    html += '</div>';
    container.innerHTML = html;
    container.querySelectorAll('.grid-day').forEach(el => {
      el.addEventListener('click', () => {
        openModal(el.dataset.key);
      });
    });
  }

  // ---- MODAL ----
  function openModal(key) {
    selectedDate = key;
    const [y, m, d] = key.split('-').map(Number);
    const dateObj = new Date(y, m - 1, d);
    const dow = dateObj.getDay();

    document.getElementById('modalDateBig').textContent = `${d} de ${MONTHS_PT[m-1]}`;
    document.getElementById('modalDateSub').textContent = `${DAYS_FULL[dow]}, ${y}`;

    renderModalEntries();
    document.getElementById('inputTime').value = '';
    document.getElementById('inputText').value = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputText').focus(), 200);
  }

  function renderModalEntries() {
    const key = selectedDate;
    const dayEntries = entries[key] || [];
    const sec = document.getElementById('modalEntriesSection');
    if (dayEntries.length === 0) {
      sec.innerHTML = '';
      return;
    }
    let html = '<div class="modal-section-label">Eventos</div><div class="modal-entries">';
    dayEntries.forEach((e, i) => {
      html += `<div class="modal-entry-item">`;
      if (e.time) html += `<span class="modal-entry-time">${e.time}</span>`;
      html += `<span class="modal-entry-text">${escHtml(e.text)}</span>`;
      html += `<button class="modal-entry-del" data-idx="${i}">&#x2715;</button>`;
      html += `</div>`;
    });
    html += '</div>';
    sec.innerHTML = html;
    sec.querySelectorAll('.modal-entry-del').forEach(btn => {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        entries[selectedDate].splice(idx, 1);
        if (entries[selectedDate].length === 0) delete entries[selectedDate];
        saveEntries();
        renderModalEntries();
        render();
      });
    });
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    selectedDate = null;
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  document.getElementById('addBtn').addEventListener('click', addEntry);
  document.getElementById('inputText').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addEntry(); }
  });

  function addEntry() {
    const time = document.getElementById('inputTime').value.trim();
    const text = document.getElementById('inputText').value.trim();
    if (!text) return;
    if (!entries[selectedDate]) entries[selectedDate] = [];
    entries[selectedDate].push({ time, text });
    // sort by time
    entries[selectedDate].sort((a, b) => {
      if (!a.time && !b.time) return 0;
      if (!a.time) return 1;
      if (!b.time) return -1;
      return a.time.localeCompare(b.time);
    });
    saveEntries();
    renderModalEntries();
    render();
    document.getElementById('inputTime').value = '';
    document.getElementById('inputText').value = '';
    document.getElementById('inputText').focus();
  }

  // ---- UTILS ----
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- INIT ----
  updateHeader();
  render();

  // Auto-scroll to today in scroll view
  setTimeout(() => {
    const activeTab = document.querySelector('.tab.active').dataset.tab;
    if (activeTab === 'scroll') {
      const todayEl = document.querySelector('.scroll-day.today');
      if (todayEl) todayEl.scrollIntoView({ block: 'start', behavior: 'smooth' });
    }
  }, 100);
</script>
</body>
</html>
